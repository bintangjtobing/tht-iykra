global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'fund-transfer-service'
    static_configs:
      - targets: ['fund-transfer-service:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
